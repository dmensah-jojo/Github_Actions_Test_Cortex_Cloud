name: Cortex CLI Code and Image Scan # 2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
  CORTEX_API_KEY_ID: ${{ secrets.CORTEX_API_KEY_ID }}
  CORTEX_API_URL: https://api-justruntime.xdr.us.paloaltonetworks.com
  IMAGE_NAME: docerleo/pcc_sandbox_analysis:latest

jobs:
  cortex-code-and-image-scan:
    name: Cortex Code and Image Scan
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Download Cortex CLI
        run: |
          set -euo pipefail

          crtx_resp=$(curl -sSL "${CORTEX_API_URL}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${CORTEX_API_KEY_ID}" \
            -H "Authorization: ${CORTEX_API_KEY}")

          crtx_url=$(echo "$crtx_resp" | jq -r ".signed_url")

          if [ -z "$crtx_url" ] || [ "$crtx_url" = "null" ]; then
            echo "Failed to retrieve Cortex CLI download URL"
            echo "$crtx_resp"
            exit 1
          fi

          curl -sSL -o cortexcli "$crtx_url"
          chmod +x cortexcli
          ./cortexcli --version

      - name: Run Cortex CLI Code Scan
        run: |
          ./cortexcli \
            --api-base-url "${CORTEX_API_URL}" \
            --api-key "${CORTEX_API_KEY}" \
            --api-key-id "${CORTEX_API_KEY_ID}" \
            code scan \
            --directory "${{ github.workspace }}" \
            --repo-id "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --source "GITHUB_ACTIONS" \
            --create-repo-if-missing

      - name: Pull Vulnerable Container Image
        run: |
          docker pull "${IMAGE_NAME}"

      - name: Run Cortex CLI Image Scan
        run: |
          ./cortexcli \
            --api-base-url "${CORTEX_API_URL}" \
            --api-key "${CORTEX_API_KEY}" \
            --api-key-id "${CORTEX_API_KEY_ID}" \
            image scan \
            --name dmensah-asha-test-2 \
            --timeout 90 \
            "${IMAGE_NAME}"
